name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, Test (unit) & Build Image
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python 3.12 (from pyproject.toml: requires-python = ">=3.12")
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # uv is the project's dependency manager (uv.lock is committed).
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          uv sync --frozen --no-install-project
          uv pip install "uvicorn>=0.34.0" ruff

      # 4. Lint (fail-fast)
      - name: Run linting (ruff)
        run: uv run ruff check .

      # 5. Unit tests ONLY
      - name: Download NLTK VADER lexicon
        run: |
          uv run python -c "
          import nltk, sys
          ok = nltk.download('vader_lexicon')
          if not ok:
              sys.exit('NLTK download failed — check network/SSL on runner')
          print('nltk.data.path:', nltk.data.path)
          "
      - name: Run unit tests
        run: uv run pytest tests/unit_tests

      # 6. Build the Docker image
      - name: Build Docker image
        run: docker build -t agenticalpha:${{ github.sha }} .